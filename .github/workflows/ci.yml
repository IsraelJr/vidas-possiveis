name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - agent/**

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout without reusable actions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Runtime diagnostics
        run: |
          node --version
          npm --version
          git rev-parse HEAD

      - name: Install pnpm
        run: npm install --global pnpm@10.12.1

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Sprint 0 audit
        run: pnpm audit:sprint0

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate

    steps:
      - name: Checkout without reusable actions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Install pnpm
        run: npm install --global pnpm@10.12.1

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Chromium
        run: pnpm --filter @vidas-possiveis/web exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: pnpm test:e2e
