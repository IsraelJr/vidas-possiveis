name: CI diagnostics

on:
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Execute and report validation
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/ci/source /tmp/ci/logs

          curl --fail --silent --show-error --location \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${HEAD_SHA}" \
            --output /tmp/ci/source.tar.gz \
            > /tmp/ci/logs/download.log 2>&1
          DOWNLOAD=$?

          if [ "$DOWNLOAD" -eq 0 ]; then
            tar -xzf /tmp/ci/source.tar.gz -C /tmp/ci/source --strip-components=1 \
              > /tmp/ci/logs/extract.log 2>&1
            EXTRACT=$?
          else
            EXTRACT=99
          fi

          if [ "$EXTRACT" -eq 0 ]; then
            cd /tmp/ci/source
            node --version > /tmp/ci/logs/runtime.log 2>&1
            npm --version >> /tmp/ci/logs/runtime.log 2>&1

            npm install --global pnpm@10.12.1 > /tmp/ci/logs/setup-pnpm.log 2>&1
            SETUP=$?
          else
            SETUP=99
          fi

          if [ "$SETUP" -eq 0 ]; then
            pnpm install --no-frozen-lockfile > /tmp/ci/logs/install.log 2>&1
            INSTALL=$?
          else
            INSTALL=99
          fi

          run_validation() {
            local name="$1"
            shift
            if [ "$INSTALL" -eq 0 ]; then
              "$@" > "/tmp/ci/logs/${name}.log" 2>&1
              return $?
            fi
            echo "Ignorado porque a instalação falhou." > "/tmp/ci/logs/${name}.log"
            return 99
          }

          run_validation lint pnpm lint
          LINT=$?
          run_validation typecheck pnpm typecheck
          TYPECHECK=$?
          run_validation tests pnpm test
          TESTS=$?
          run_validation build pnpm build
          BUILD=$?
          run_validation audit pnpm audit:sprint0
          AUDIT=$?

          SUMMARY=$(printf 'download=%s, extract=%s, setup=%s, install=%s, lint=%s, typecheck=%s, tests=%s, build=%s, audit=%s' \
            "$DOWNLOAD" "$EXTRACT" "$SETUP" "$INSTALL" "$LINT" "$TYPECHECK" "$TESTS" "$BUILD" "$AUDIT")

          {
            echo "### Diagnóstico automático da CI"
            echo
            echo "Commit: \`${HEAD_SHA}\`"
            echo
            echo "\`${SUMMARY}\`"
            echo
            for log in download extract runtime setup-pnpm install lint typecheck tests build audit; do
              echo "<details><summary>${log}</summary>"
              echo
              echo '```text'
              tail -n 80 "/tmp/ci/logs/${log}.log" 2>/dev/null || true
              echo '```'
              echo "</details>"
              echo
            done
          } > /tmp/ci/comment.md

          jq -n --rawfile body /tmp/ci/comment.md '{body: $body}' > /tmp/ci/comment.json
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "Content-Type: application/json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --data-binary @/tmp/ci/comment.json
          COMMENT=$?

          echo "$SUMMARY"
          test "$COMMENT" -eq 0
          test "$DOWNLOAD" -eq 0
          test "$EXTRACT" -eq 0
          test "$SETUP" -eq 0
          test "$INSTALL" -eq 0
          test "$LINT" -eq 0
          test "$TYPECHECK" -eq 0
          test "$TESTS" -eq 0
          test "$BUILD" -eq 0
          test "$AUDIT" -eq 0
