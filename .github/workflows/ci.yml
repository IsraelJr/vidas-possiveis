name: CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/package.json', 'pnpm-workspace.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Initialize diagnostics
        run: mkdir -p ci-diagnostics

      - name: Install dependencies
        shell: bash
        run: |
          set -o pipefail
          pnpm install --no-frozen-lockfile --prefer-offline 2>&1 | tee ci-diagnostics/install.log
          cp pnpm-lock.yaml ci-diagnostics/pnpm-lock.yaml

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee ci-diagnostics/lint.log

      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee ci-diagnostics/typecheck.log

      - name: Unit tests
        shell: bash
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee ci-diagnostics/unit-tests.log

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee ci-diagnostics/build.log

      - name: Sprint 0 audit
        shell: bash
        run: |
          set -o pipefail
          pnpm audit:sprint0 2>&1 | tee ci-diagnostics/sprint-0-audit.log

      - name: GitHub Actions usage audit
        shell: bash
        run: |
          set -o pipefail
          pnpm audit:actions 2>&1 | tee ci-diagnostics/actions-audit.log

      - name: Install Chromium
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @vidas-possiveis/web exec playwright install --with-deps chromium 2>&1 | tee ci-diagnostics/chromium-install.log

      - name: End-to-end tests
        shell: bash
        run: |
          set -o pipefail
          pnpm test:e2e 2>&1 | tee ci-diagnostics/e2e.log

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-diagnostics
          path: ci-diagnostics/
          retention-days: 1
          if-no-files-found: error
